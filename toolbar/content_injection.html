<div class="symbar-main-box">
    <div class="symbar-nav-box">
        <select id="symbar_select_form" class="symbar-toolbar-select-form">
            <option value="">Recently Used</option>
            <option value="symbar_custom">Custom</option>
            <option value="symbar_french">French</option>
            <option value="symbar_spanish">Spanish</option>
            <option value="symbar_german">German</option>
            <option value="symbar_math">Math</option>
            <option value="symbar_greek">Greek</option>
            <option value="symbar_arrows">Arrows</option>
            <option value="symbar_currency">Currency</option>
            <option value="symbar_common">Common</option>
        </select>
        <input type="search" id="symbar_search" class="symbar-toolbar-search" placeholder="Search symbols..." />
    </div>
    <div id="symbar_recent" class="symbar-toolbar-toggled-btn-box"></div>
    <div id="symbar_custom" class="symbar-toolbar-hidden-btn-box"></div>
    <div id="symbar_search_results" class="symbar-search-results"></div>
    <div id="symbar_french" class="symbar-toolbar-hidden-btn-box"></div>
    <div id="symbar_spanish" class="symbar-toolbar-hidden-btn-box"></div>
    <div id="symbar_german" class="symbar-toolbar-hidden-btn-box"></div>
    <div id="symbar_math" class="symbar-toolbar-hidden-btn-box"></div>
    <div id="symbar_greek" class="symbar-toolbar-hidden-btn-box"></div>
    <div id="symbar_arrows" class="symbar-toolbar-hidden-btn-box"></div>
    <div id="symbar_currency" class="symbar-toolbar-hidden-btn-box"></div>
    <div id="symbar_common" class="symbar-toolbar-hidden-btn-box"></div>
</div>
<div class="symbar-action-box">
    <button id="symbar_minimize_toolbar" class="symbar-action-btn">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Minimize
    </button>
    <button id="symbar_close_toolbar" class="symbar-action-btn symbar-action-btn-close">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Close
    </button>
    <button id="symbar_options" class="symbar-action-btn">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM8 9.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM8 16a1.5 1.5 0 110-3 1.5 1.5 0 010 3z" fill="currentColor"/></svg>
        Settings
    </button>
    <button id="symbar_dark_mode" class="symbar-action-btn symbar-action-btn-theme"></button>
    <div class="symbar-toolbar-instructions" id="symbar_instructions">
        <p>Click any symbol to copy</p>
    </div>
</div>
